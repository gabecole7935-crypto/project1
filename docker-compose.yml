on: '3'

services:
  lb:
    image: nginx:latest
    container_name: lb
    ports:
      - "8080:80"
    volumes:
      - ./lb/default.conf:/etc/nginx/conf.d/default.conf
    restart: always
    depends_on:
      - web1
      - web2

  web1:
    image: nginx:latest
    container_name: web1
    volumes:
      - ./web1:/usr/share/nginx/html
    restart: always

  web2:
    image: nginx:latest
    container_name: web2
    volumes:
      - ./web2:/usr/share/nginx/html
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    restart: always
